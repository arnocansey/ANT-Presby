services:
  - type: web
    name: ant-press-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npm run prisma:generate && npm run migrate:features
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: ACCESS_TOKEN_COOKIE_NAME
        value: access_token
      - key: REFRESH_TOKEN_COOKIE_NAME
        value: refresh_token
      - key: JWT_EXPIRATION
        value: 1d
      - key: REFRESH_TOKEN_EXPIRATION
        value: 30d
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 100
      - key: PRISMA_CONNECTION_LIMIT
        value: 15
      - key: PRISMA_POOL_TIMEOUT
        value: 30
      - key: MAX_FILE_SIZE
        value: 5242880
      - key: UPLOAD_DIR
        value: ./uploads
